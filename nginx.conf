server {
    listen 80;
    server_name visiontarot.com www.visiontarot.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name visiontarot.com www.visiontarot.com;

    ssl_certificate /etc/letsencrypt/live/visiontarot.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/visiontarot.com/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
